<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Add a transfer — AI Transfer Window</title>
<link rel="icon" href="favicon.svg" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: var(--bg); }
  .admin { max-width: 620px; margin: 22px auto; background: #fff; border: 1px solid var(--head-border); border-radius: 8px; padding: 24px 26px 32px; }
  .admin h1 { font-size: 24px; letter-spacing: -0.02em; margin: 10px 0 2px; color: var(--navy); }
  .admin .lead { color: var(--muted); margin: 0 0 22px; font-size: 13.5px; }
  .field { display: grid; gap: 5px; margin-bottom: 14px; }
  .field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .field input, .field select, .field textarea {
    background: #fff; border: 1px solid var(--head-border); color: var(--text);
    border-radius: 6px; padding: 9px 11px; font: inherit; font-size: 14px; width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--blue); }
  .field textarea { min-height: 64px; resize: vertical; }
  .grid2 { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: end; }
  .grid2 .arrow { padding-bottom: 10px; color: var(--muted); font-weight: 800; font-size: 18px; text-align: center; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .check { display: flex; align-items: center; gap: 8px; }
  .check input { width: auto; }
  .btn-row { display: flex; gap: 12px; align-items: center; margin-top: 6px; }
  .btn-go { background: var(--accent); color: #1a1300; border: none; cursor: pointer; font-weight: 800; padding: 11px 22px; border-radius: 6px; font-size: 14.5px; }
  .btn-go:disabled { opacity: .5; cursor: default; }
  .msg { margin-top: 16px; padding: 12px 14px; border-radius: 6px; font-size: 13.5px; display: none; }
  .msg.ok { background: #e7f6ee; color: var(--green); display: block; }
  .msg.err { background: #fbe9e7; color: var(--red); display: block; }
  .keybar { display: flex; gap: 10px; align-items: center; margin-bottom: 22px; padding: 11px 13px; border: 1px dashed var(--head-border); border-radius: 6px; background: #fafbfc; }
  .keybar input { flex: 1; background: #fff; border: 1px solid var(--head-border); color: var(--text); border-radius: 5px; padding: 7px 9px; font: inherit; }
  .tweet { margin-top: 16px; padding: 14px; border: 1px solid var(--head-border); border-radius: 8px; background: #fafbfc; display: none; }
  .tweet pre { white-space: pre-wrap; font: inherit; font-size: 13px; color: var(--text); margin: 0 0 12px; }
  .tweet a { color: var(--blue-link); font-weight: 700; }
  .back { color: var(--blue-link); font-size: 13.5px; }
</style>
</head>
<body>
  <div class="admin">
    <a class="back" href="/">← Back to the window</a>
    <h1 style="margin-top:14px">Add a transfer ⚡</h1>
    <p class="lead">Posts live to the site instantly. No redeploy.</p>

    <div class="keybar">
      <span style="font-size:13px;color:var(--muted);font-weight:700">Admin key</span>
      <input id="key" type="password" placeholder="paste your admin key" autocomplete="off" />
    </div>

    <form id="form">
      <div class="field">
        <label>Researcher name *</label>
        <input id="name" required placeholder="John Jumper" />
      </div>
      <div class="field">
        <label>Title / descriptor</label>
        <input id="title" placeholder="Nobel laureate, AlphaFold co-creator" />
      </div>

      <div class="grid2">
        <div class="field" style="margin:0">
          <label>From *</label>
          <select id="from" required></select>
        </div>
        <div class="arrow">→</div>
        <div class="field" style="margin:0">
          <label>To *</label>
          <select id="to" required></select>
        </div>
      </div>

      <div class="row2" style="margin-top:16px">
        <div class="field">
          <label>Date *</label>
          <input id="date" type="date" required />
        </div>
        <div class="field">
          <label>Role</label>
          <select id="role">
            <option value="">—</option>
            <option>Research</option>
            <option>Engineering</option>
            <option>Safety</option>
            <option>Leadership</option>
            <option>Product</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Note</label>
        <textarea id="note" placeholder="One or two sentences of context."></textarea>
      </div>

      <div class="row2">
        <div class="field">
          <label>Reported fee (comp)</label>
          <input id="fee" placeholder="~$1.5B / 6yr (disputed)" />
        </div>
        <div class="field">
          <label>Source URL</label>
          <input id="source" type="url" placeholder="https://..." />
        </div>
      </div>

      <div class="check field">
        <input id="rumored" type="checkbox" />
        <label style="text-transform:none;letter-spacing:0;font-size:14px;color:var(--text)">Rumored / unconfirmed</label>
      </div>

      <div class="btn-row">
        <button class="btn-go" id="go" type="submit">Add transfer</button>
        <span style="font-size:13px;color:var(--muted)">key is saved in this browser only</span>
      </div>
    </form>

    <div class="msg" id="msg"></div>

    <div class="tweet" id="tweet">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px">Ready-to-post tweet</div>
      <pre id="tweetText"></pre>
      <a id="tweetLink" target="_blank" rel="noopener">Post on X →</a>
    </div>
  </div>

  <script>
    const X_HANDLE = "mendurmen"; // keep in sync with app.js
    const $ = (id) => document.getElementById(id);
    let LABS = {};

    // restore saved key
    $("key").value = localStorage.getItem("atw_admin_key") || "";
    $("key").addEventListener("input", () => localStorage.setItem("atw_admin_key", $("key").value));

    fetch("data/labs.json").then(r => r.json()).then(labs => {
      LABS = labs;
      const opts = Object.entries(labs).map(([id, l]) => `<option value="${id}">${l.name}</option>`).join("");
      $("from").innerHTML = `<option value="">—</option>` + opts;
      $("to").innerHTML = `<option value="">—</option>` + opts;
    });

    function showMsg(text, ok) {
      const m = $("msg");
      m.textContent = text;
      m.className = "msg " + (ok ? "ok" : "err");
    }

    function buildTweet(t) {
      const from = (LABS[t.from] || {}).name || t.from;
      const to = (LABS[t.to] || {}).name || t.to;
      const tag = t.rumored ? "🔮 RUMOR" : "🔁 OFFICIAL";
      const fee = t.fee ? `\nFee: ${t.fee}` : "";
      const text = `${tag}\n\n${t.name} — ${from} → ${to}${fee}\n\n${t.note || ""}\n\nTracked on the AI Transfer Window 👇`;
      return text.trim();
    }

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const key = $("key").value.trim();
      if (!key) return showMsg("Enter your admin key first.", false);

      const t = {
        name: $("name").value.trim(),
        title: $("title").value.trim(),
        from: $("from").value,
        to: $("to").value,
        date: $("date").value,
        role: $("role").value,
        note: $("note").value.trim(),
        fee: $("fee").value.trim() || null,
        rumored: $("rumored").checked,
        source: $("source").value.trim()
      };
      if (!t.name || !t.from || !t.to || !t.date) return showMsg("Name, From, To and Date are required.", false);
      if (t.from === t.to) return showMsg("From and To can't be the same lab.", false);

      $("go").disabled = true;
      try {
        const res = await fetch("/api/transfers", {
          method: "POST",
          headers: { "content-type": "application/json", "x-admin-key": key },
          body: JSON.stringify(t)
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || "Failed.", false); $("go").disabled = false; return; }

        showMsg(`Added ✓  (${data.count} dynamic transfers live)`, true);
        const text = buildTweet(t);
        $("tweetText").textContent = text;
        $("tweetLink").href = `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.origin + "/")}`;
        $("tweet").style.display = "block";
        $("form").reset();
        $("key").value = key; localStorage.setItem("atw_admin_key", key);
      } catch (err) {
        showMsg("Network error: " + err.message, false);
      }
      $("go").disabled = false;
    });
  </script>
</body>
</html>
