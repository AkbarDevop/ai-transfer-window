# Static site + serverless function for dynamic transfers. Deploy with:
#   netlify deploy --prod --dir .
[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean API path -> function
[[redirects]]
  from = "/api/transfers"
  to = "/.netlify/functions/transfers"
  status = 200
