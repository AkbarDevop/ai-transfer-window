# Static site + serverless function for dynamic transfers. Deploy with:
#   netlify deploy --prod --dir .
[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean API paths -> functions
[[redirects]]
  from = "/api/transfers"
  to = "/.netlify/functions/transfers"
  status = 200

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[redirects]]
  from = "/api/papers"
  to = "/.netlify/functions/papers"
  status = 200

[[redirects]]
  from = "/api/hit"
  to = "/.netlify/functions/hit"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200
